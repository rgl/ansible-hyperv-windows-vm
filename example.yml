- name: Create Virtual Machine
  hosts:
    - vms
  gather_facts: false
  become: false
  tasks:
    - name: Create Virtual Machine
      delegate_to: hv
      block:
        - name: Create Virtual Machine
          ansible.builtin.import_role:
            name: vm_create

- name: Configure Windows
  hosts:
    - vms
  gather_facts: true
  become: false
  roles:
    - data_disk
    - base
